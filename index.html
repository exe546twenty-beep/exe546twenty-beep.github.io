<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Manga Reader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #e0e0e0;
            --accent: #5b9bd5;
            --nav-bg: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        .loading {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; font-size: 18px;
        }
        .loading .spinner {
            width: 40px; height: 40px; border: 4px solid #333;
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-right: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #ff6b6b; text-align: center; padding: 40px 20px; }
        .pages-container { padding-bottom: 70px; }
        .pages-container img {
            display: block; width: 100%; height: auto;
        }
        .page-wrapper {
            position: relative; min-height: 100px;
            background: #111; margin-bottom: 2px;
        }
        .page-wrapper.loading-img::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 30px; height: 30px; margin: -15px 0 0 -15px;
            border: 3px solid #333; border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--nav-bg); padding: 10px 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #333; z-index: 100;
        }
        .nav-btn {
            background: var(--accent); color: #fff; border: none;
            padding: 10px 20px; border-radius: 8px; font-size: 14px;
            cursor: pointer; font-weight: 600;
        }
        .nav-btn:disabled { opacity: 0.3; cursor: default; }
        .nav-btn:active:not(:disabled) { transform: scale(0.95); }
        .chapter-title {
            font-size: 13px; color: #888; text-align: center; flex: 1;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading" id="loadingScreen">
            <div class="spinner"></div>
            <span>Загрузка главы...</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            // Адаптация темы
            if (tg.themeParams) {
                const tp = tg.themeParams;
                if (tp.bg_color) document.documentElement.style.setProperty('--bg', tp.bg_color);
                if (tp.text_color) document.documentElement.style.setProperty('--text', tp.text_color);
                if (tp.button_color) document.documentElement.style.setProperty('--accent', tp.button_color);
                if (tp.secondary_bg_color) document.documentElement.style.setProperty('--nav-bg', tp.secondary_bg_color);
            }
        }

        const API_BASE = 'https://desu.uno/manga/api';
        const params = new URLSearchParams(window.location.search);
        let mangaId = params.get('manga_id');
        let chapterId = params.get('chapter_id');
        let chapters = [];
        let currentChapterIndex = -1;

        async function fetchJSON(url) {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            return resp.json();
        }

        async function loadMangaInfo() {
            const data = await fetchJSON(`${API_BASE}/${mangaId}`);
            const info = data.response || {};
            const allCh = info.chapters?.list || [];
            chapters = allCh
                .filter(ch => ch.ch)
                .sort((a, b) => parseFloat(a.ch) - parseFloat(b.ch));
            currentChapterIndex = chapters.findIndex(ch => String(ch.id) === String(chapterId));
            if (currentChapterIndex === -1 && chapters.length > 0) {
                currentChapterIndex = 0;
                chapterId = chapters[0].id;
            }
        }

        async function loadChapter() {
            const app = document.getElementById('app');
            app.innerHTML = '<div class="loading" id="loadingScreen"><div class="spinner"></div><span>Загрузка главы...</span></div>';

            try {
                if (chapters.length === 0) await loadMangaInfo();
                const data = await fetchJSON(`${API_BASE}/${mangaId}/chapter/${chapterId}`);
                const chData = data.response || {};
                const pages = chData.pages?.list || [];
                if (pages.length === 0) {
                    app.innerHTML = '<div class="error">Страницы не найдены</div>';
                    return;
                }

                const currentCh = chapters[currentChapterIndex];
                const chLabel = currentCh ? `Глава ${currentCh.ch}` : `Глава`;

                let html = '<div class="pages-container">';
                pages.forEach((page, i) => {
                    const imgUrl = typeof page === 'string' ? page : page.img;
                    if (!imgUrl) return;
                    html += `<div class="page-wrapper loading-img" id="pw_${i}">` +
                        `<img data-src="${imgUrl}" alt="Page ${i+1}" onload="this.parentElement.classList.remove('loading-img')" onerror="this.parentElement.classList.remove('loading-img')">` +
                        `</div>`;
                });
                html += '</div>';

                // Nav bar
                const hasPrev = currentChapterIndex > 0;
                const hasNext = currentChapterIndex < chapters.length - 1;
                html += `<div class="nav-bar">` +
                    `<button class="nav-btn" id="prevBtn" ${hasPrev ? '' : 'disabled'}>← Пред.</button>` +
                    `<span class="chapter-title">${chLabel}</span>` +
                    `<button class="nav-btn" id="nextBtn" ${hasNext ? '' : 'disabled'}>След. →</button>` +
                    `</div>`;

                app.innerHTML = html;

                // Lazy load
                const imgs = app.querySelectorAll('img[data-src]');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            img.src = img.dataset.src;
                            img.removeAttribute('data-src');
                            observer.unobserve(img);
                        }
                    });
                }, { rootMargin: '500px' });
                imgs.forEach(img => observer.observe(img));

                // Nav events
                document.getElementById('prevBtn')?.addEventListener('click', () => navigateChapter(-1));
                document.getElementById('nextBtn')?.addEventListener('click', () => navigateChapter(1));

            } catch (e) {
                app.innerHTML = `<div class="error">Ошибка загрузки: ${e.message}</div>`;
            }
        }

        function navigateChapter(direction) {
            const newIndex = currentChapterIndex + direction;
            if (newIndex < 0 || newIndex >= chapters.length) return;
            currentChapterIndex = newIndex;
            chapterId = chapters[newIndex].id;
            window.scrollTo(0, 0);
            loadChapter();
        }

        // Start
        if (!mangaId) {
            // Try to get from start_param
            if (tg?.initDataUnsafe?.start_param) {
                const sp = tg.initDataUnsafe.start_param.split('_');
                mangaId = sp[0];
                chapterId = sp[1];
            }
        }
        if (mangaId && chapterId) {
            loadChapter();
        } else {
            document.getElementById('app').innerHTML = '<div class="error">Не указаны параметры manga_id и chapter_id</div>';
        }
    </script>
</body>
</html>
