<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniMangaBot — Реклама</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #eee);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .container { text-align: center; max-width: 400px; width: 100%; }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 22px; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: var(--tg-theme-hint-color, #aaa); margin-bottom: 24px; line-height: 1.4; }
        .limit-info { background: var(--tg-theme-secondary-bg-color, #16213e); border-radius: 12px; padding: 12px 16px; margin-bottom: 24px; font-size: 14px; }
        .limit-info span { color: var(--tg-theme-link-color, #4fc3f7); font-weight: 600; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
        .btn-watch { background: var(--tg-theme-button-color, #4fc3f7); color: var(--tg-theme-button-text-color, #fff); }
        .btn-watch:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { margin-top: 16px; font-size: 14px; min-height: 20px; }
        .status.error { color: #f44336; }
        .status.loading { color: var(--tg-theme-hint-color, #aaa); }
        .reward-done { display: none; }
        .reward-done.show { display: block; }
        .reward-icon { font-size: 80px; margin-bottom: 16px; }
        .reward-text { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #4caf50; }
        .reward-sub { font-size: 14px; color: var(--tg-theme-hint-color, #aaa); margin-bottom: 24px; }
    </style>
</head>
<body>
    <div class="container" id="adScreen">
        <div class="icon">📺</div>
        <h1>Рекламная пауза</h1>
        <div class="subtitle">Посмотрите короткую рекламу, чтобы продолжить<br>скачивание глав бесплатно</div>
        <div class="limit-info">📊 Ваш лимит: <span id="limitValue">5</span> глав до рекламы</div>
        <button class="btn btn-watch" id="watchBtn" onclick="showAd()">▶️ Смотреть рекламу</button>
        <div class="status" id="status"></div>
    </div>

    <div class="container reward-done" id="rewardScreen">
        <div class="reward-icon">✅</div>
        <div class="reward-text">Награда получена!</div>
        <div class="reward-sub">Глава загружается автоматически...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        const blockId = params.get('blockId') || '30407';
        const limit = params.get('limit') || '5';

        document.getElementById('limitValue').textContent = limit;

        let AdController = null;
        try {
            AdController = window.Adsgram.init({ blockId: "bot-" + blockId });
        } catch (e) {
            console.error('AdsGram init error:', e);
            // Пробуем без префикса
            try {
                AdController = window.Adsgram.init({ blockId: blockId });
            } catch (e2) {
                console.error('AdsGram init error 2:', e2);
            }
        }

        function setStatus(text, type) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = 'status ' + (type || '');
        }

        function showAd() {
            if (!AdController) {
                setStatus('Реклама недоступна, засчитываем просмотр...', 'loading');
                setTimeout(() => sendReward(), 2000);
                return;
            }

            const btn = document.getElementById('watchBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Загрузка...';
            setStatus('Загружаю рекламу...', 'loading');

            AdController.show()
                .then((result) => {
                    sendReward();
                })
                .catch((result) => {
                    console.log('Ad error:', result);
                    // Если ошибка — всё равно засчитываем
                    setStatus('Реклама завершена', '');
                    sendReward();
                });
        }

        function sendReward() {
            document.getElementById('adScreen').style.display = 'none';
            document.getElementById('rewardScreen').classList.add('show');

            tg.sendData(JSON.stringify({ action: 'ad_reward', timestamp: Date.now() }));
            setTimeout(() => { tg.close(); }, 2000);
        }
    </script>
</body>
</html>
